<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Predicción de edad</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <section class="page-shell">
    <ion-card>
      <ion-card-header>
        <ion-card-title>Consulta por nombre</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-item>
          <ion-input label="Nombre" labelPlacement="stacked" [(ngModel)]="name" placeholder="Ej: meelad"></ion-input>
        </ion-item>
        <ion-button expand="block" class="ion-margin-top" (click)="predict()" [disabled]="loading">
          <ion-icon slot="start" name="search-outline"></ion-icon>
          Consultar
        </ion-button>
      </ion-card-content>
    </ion-card>

    <ion-card *ngIf="result?.age !== null && result?.age !== undefined && stage">
      <div class="age-art" *ngIf="imageAvailable; else ageFallback">
        <img [src]="imagePath" [alt]="stage" (error)="imageAvailable = false" />
      </div>
      <ng-template #ageFallback>
        <div class="age-fallback">
          <ion-icon name="person-outline"></ion-icon>
        </div>
      </ng-template>
      <ion-card-header>
        <ion-card-title>{{ result?.age }} años</ion-card-title>
        <ion-card-subtitle>{{ stage }}</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>{{ message }}</ion-card-content>
    </ion-card>

    <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
    <ion-note color="danger" *ngIf="error">{{ error }}</ion-note>
  </section>
</ion-content>
